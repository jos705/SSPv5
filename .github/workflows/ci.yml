name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          # TEST_DATABASE_URL points at the PostgreSQL service container.
          # DATABASE_URL is set to a dummy value so config.py / load_dotenv()
          # does not raise on a missing .env file; tests never use it.
          TEST_DATABASE_URL: postgresql+psycopg://test_user:test_password@localhost:5432/test_db
          DATABASE_URL: postgresql+psycopg://test_user:test_password@localhost:5432/test_db
          SECRET_KEY: ci-test-secret-key
          FLASK_APP: run.py
        run: pytest tests/ -v --tb=short
