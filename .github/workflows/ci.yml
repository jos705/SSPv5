name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          # Tests use SQLite in-memory via TestConfig — no real DB needed.
          # Provide a dummy DATABASE_URL so python-dotenv / config.py
          # does not try to load a missing .env file at import time.
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: ci-test-secret-key
          FLASK_APP: run.py
        run: pytest tests/ -v --tb=short
